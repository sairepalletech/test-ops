name: Dependency Resolution

on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  notify-dependents:
    name: Notify Dependent Tasks
    runs-on: ubuntu-latest
    steps:
      - name: Find and notify tasks waiting on this issue
        uses: actions/github-script@v7
        with:
          script: |
            const closedIssueNumber = context.payload.issue.number;
            const closedTitle = context.payload.issue.title;
            const today = new Date().toISOString().split('T')[0];

            // Find all open issues with has-dependency label
            const dependentIssues = await github.paginate(
              github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'has-dependency',
                state: 'open',
                per_page: 100
              }
            );

            core.info(`Checking ${dependentIssues.length} issues with has-dependency label`);

            let notified = 0;
            for (const issue of dependentIssues) {
              const body = issue.body || '';
              // Check if this issue references the closed issue
              const refPattern = new RegExp(`#${closedIssueNumber}\\b`);

              // Also check comments for /depends-on references
              // For simplicity, check issue body and title for the reference
              if (refPattern.test(body) || refPattern.test(issue.title)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    '## 🔓 Dependency Resolved',
                    '',
                    `Your dependency **#${closedIssueNumber}** — ${closedTitle} — has been closed.`,
                    '',
                    '| Field | Value |',
                    '|-------|-------|',
                    `| **Dependency closed** | #${closedIssueNumber} |`,
                    `| **Date** | ${today} |`,
                    '',
                    '**The SLA clock has resumed.** If you are ready to proceed, post `/start` to begin work.',
                    '',
                    '> If other dependencies remain open, the SLA clock stays paused until all are resolved.',
                    '',
                    '---',
                    '*Automated by CI/CD IssueOps | ci-cd-team*'
                  ].join('\n')
                });
                notified++;
                core.info(`Notified #${issue.number} that dependency #${closedIssueNumber} is resolved`);
              }
            }

            core.info(`Notified ${notified} dependent issues`);
